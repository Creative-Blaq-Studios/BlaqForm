<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <!--
    FormKit Product Mark — Creative Blaq Studios

    Narrower clipboard, pen pointing top-right (NE),
    "Fk" text integrated into the clip tab area.
  -->

  <!-- Outer shell -->
  <rect x="64" y="64" width="384" height="384" rx="72" fill="#000000"/>

  <!-- Inner clipboard — narrower, more portrait-like -->
  <path d="
    M 208 92
    L 304 92
    Q 318 92 318 106
    L 318 132
    L 372 132
    Q 392 132 392 152
    L 392 416
    Q 392 432 372 432
    L 140 432
    Q 120 432 120 416
    L 120 152
    Q 120 132 140 132
    L 194 132
    L 194 106
    Q 194 92 208 92
    Z
  " fill="#1C1C1E"/>

  <!-- Clip hole -->
  <rect x="222" y="98" width="68" height="24" rx="12" fill="#000000"/>

  <!-- "Fk" text — small, inside the clip tab area, below the hole -->
  <text x="256" y="154" font-family="Arial, Helvetica, sans-serif" font-weight="700" font-size="26" fill="#555555" text-anchor="middle" letter-spacing="1">Fk</text>

  <!-- Form field bars -->
  <rect x="156" y="184" width="200" height="26" rx="9" fill="#F8F7F4"/>
  <rect x="156" y="234" width="152" height="26" rx="9" fill="#F8F7F4"/>
  <rect x="156" y="284" width="116" height="26" rx="9" fill="#FF6B00"/>

  <!-- Pen — pointing NE (top-right), tip in upper area, base at bottom-right -->
  <g transform="rotate(-135, 370, 400)">
    <!-- Pen barrel -->
    <rect x="358" y="320" width="22" height="110" rx="4" fill="#F8F7F4"/>
    <!-- Pen grip band -->
    <rect x="356" y="414" width="26" height="10" rx="2" fill="#999999"/>
    <!-- Pen tip -->
    <path d="M 360 424 L 378 424 L 369 446 Z" fill="#FF6B00"/>
  </g>

</svg>
